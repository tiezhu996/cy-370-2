server:
  port: ${PORT:29510}

spring:
  datasource:
    url: "${SPRING_DATASOURCE_URL:jdbc:h2:mem:app;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1;INIT=RUNSCRIPT FROM 'classpath:init.sql'}"
    driver-class-name: "${SPRING_DATASOURCE_DRIVER:org.h2.Driver}"
    username: "${DB_USER:sa}"
    password: "${DB_PASSWORD:}"
  jpa:
    database-platform: "${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.H2Dialect}"
    hibernate:
      ddl-auto: none
    open-in-view: false
